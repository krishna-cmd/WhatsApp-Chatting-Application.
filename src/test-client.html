<!DOCTYPE html>
<html>
<head>
  <title>Chat Test</title>
</head>
<body>

<h2>Realtime Chat</h2>
<input id="receiver" placeholder="Enter receiver ID"/>
<input id="message" placeholder="Type message"/>
<button onclick="sendMessage()">Send</button>

<ul id="messages"></ul>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

<script>

const socket = io("http://localhost:3000");
const userId = prompt("Enter your userId");
const receiverId = prompt("Enter your receiverId");


socket.on("connect", () => {
  console.log("Connected:", socket.id);
});

socket.on("receiver_message", (data) => {
  console.log("Message received in browser:", data);

  const li = document.createElement("li");
  li.innerText = `${data.senderId || 'unknown'}: ${data.message || data}`;

  document.getElementById("messages").appendChild(li);
});

socket.emit("join", userId);

function sendMessage() {
  const msg = document.getElementById("message").value;
  

  socket.emit("send_message", {
    senderId: userId,
    receiverId,
    message: msg,
  });
}


</script>

</body>
</html>
